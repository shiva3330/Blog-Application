<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BlogZone</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        /* NAVBAR */

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 8%;
            background:#222;
            color:#fff;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        nav h2{
            color:#00d4ff;
            font-size:28px;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:30px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            transition:.3s;
            font-weight:500;
        }

        nav ul li a:hover{
            color:#00d4ff;
        }

        /* MAIN */

        .container{
            width:90%;
            max-width:1200px;
            margin:40px auto;
        }

        /* ADD BUTTON */

        .add-btn{
            display:inline-block;
            padding:12px 25px;
            background:#0077ff;
            color:white;
            text-decoration:none;
            border-radius:8px;
            margin-bottom:30px;
            transition:.3s;
        }

        .add-btn:hover{
            background:#0057d8;
            transform:translateY(-2px);
        }

        /* SEARCH CARD */

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            margin-bottom:35px;
        }

        .card h3{
            margin-bottom:20px;
        }

        .search-box{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        .search-box input{
            flex:1;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        button{
            border:none;
            padding:12px 20px;
            color:white;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        .update{
            background:#ff9800;
        }

        .delete{
            background:#e53935;
        }

        button:hover{
            transform:translateY(-2px);
        }

        /* TABLE */

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            overflow:hidden;
            border-radius:12px;
        }

        table th{
            background:#0077ff;
            color:white;
            padding:18px;
        }

        table td{
            padding:18px;
            border-bottom:1px solid #eee;
            text-align: center;
        }

        table tr:hover{
            background:#f1f8ff;
        }

        table td:nth-child(3){
            max-width:450px;
        }

        /* FOOTER */

        /* RESPONSIVE */

        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:15px;
            }

            nav ul{
                flex-wrap:wrap;
                justify-content:center;
            }

            .search-box{
                flex-direction:column;
            }

            button{
                width:100%;
            }

            table{
                display:block;
                overflow-x:auto;
            }

        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav>

    <h2>BlogZone</h2>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/blogs">Blogs</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>

</nav>

<div class="container">

    <a href="/new" class="add-btn">+ Add New Post</a>

    <div class="card">

        <h3>Update or Delete Post</h3>

        <div class="search-box">

            <input id="id" type="text" placeholder="Enter Post ID">

            <button class="update" onclick="editPost()">Edit</button>

            <button class="delete" onclick="deletePost()">Delete</button>

        </div>

    </div>

    <table>

        <thead>

        <tr>
            <th>Id</th>
            <th>Title</th>
            <th>Author</th>
            <th>Content</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="post : ${listPosts}">
            <td th:text="${post.id}"></td>
            <td th:text="${post.title}"></td>
            <td th:text="${post.author}"></td>
            <td th:text="${post.content}"></td>
        </tr>

        </tbody>

    </table>

</div>

<script>
    function editPost(){
        const id = document.getElementById('id').value;
        window.location.href = "/edit/" + id;
    }
    function deletePost(){
        const id = document.getElementById('id').value;
        if(id && confirm("Are you sure you want to delete this post?")){
        window.location.href = "/delete/" + id;
        }
        else {
            alert("Enter a valid post Id")
        }
    }
</script>
</body>
</html>
